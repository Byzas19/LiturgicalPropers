name: Update Liturgical Propers

on:
  schedule:
    # Twice a week: Tuesday and Friday at 6:00 AM UTC
    # Tuesday catches early-week posts; Friday catches late posts before Sunday
    - cron: '0 6 * * 2,5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-propers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run pipeline
        run: npx ts-node --project scripts/tsconfig.json scripts/pipeline.ts

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update propers data [$(date -u +%Y-%m-%d)]"
          git push
